<!DOCTYPE html>
<html lang="vi" x-data="app()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Booking - Hạ Linh Hotel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>body{font-family:sans-serif}</style>
</head>
<body class="bg-slate-100 p-6">

<h1 class="text-2xl font-bold mb-6">📋 Quản lý Booking</h1>

<!-- FORM INPUT -->
<div class="bg-white p-4 rounded shadow mb-6">
  <h2 class="font-semibold mb-3">Thêm booking</h2>
  <div class="grid md:grid-cols-5 gap-2">
    <input x-model="form.name" placeholder="Tên" class="border p-2">
    <input x-model="form.phone" placeholder="SĐT" class="border p-2">
    <input x-model="form.room" placeholder="Phòng" class="border p-2">
    <input x-model="form.date" type="date" class="border p-2">
    <button @click="addBooking()" class="bg-blue-600 text-white px-4">Thêm</button>
  </div>
</div>

<!-- TABLE -->
<div class="bg-white rounded shadow overflow-x-auto">
  <table class="w-full text-sm">
    <thead class="bg-slate-200">
      <tr>
        <th class="p-2">Tên</th>
        <th>SĐT</th>
        <th>Phòng</th>
        <th>Ngày</th>
        <th>Trạng thái</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <template x-for="(b,i) in bookings" :key="i">
        <tr class="border-t">
          <td class="p-2" x-text="b.name"></td>
          <td x-text="b.phone"></td>
          <td x-text="b.room"></td>
          <td x-text="b.date"></td>
          <td>
            <select x-model="b.status" class="border">
              <option>Pending</option>
              <option>Confirmed</option>
              <option>Done</option>
            </select>
          </td>
          <td>
            <button @click="remove(i)" class="text-red-500">X</button>
          </td>
        </tr>
      </template>
    </tbody>
  </table>
</div>

<!-- EXPORT -->
<div class="mt-6">
  <button @click="exportData()" class="bg-green-600 text-white px-4 py-2">Export CSV</button>
</div>

<script>
function app(){
return{
form:{name:'',phone:'',room:'',date:''},
bookings:JSON.parse(localStorage.getItem('bookings')||'[]'),
addBooking(){
this.bookings.push({...this.form,status:'Pending'});
this.save();
this.form={name:'',phone:'',room:'',date:''}
},
remove(i){this.bookings.splice(i,1);this.save()},
save(){localStorage.setItem('bookings',JSON.stringify(this.bookings))},
exportData(){
let csv='Name,Phone,Room,Date,Status\n';
this.bookings.forEach(b=>{
csv+=`${b.name},${b.phone},${b.room},${b.date},${b.status}\n`
});
let blob=new Blob([csv],{type:'text/csv'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='booking.csv';
a.click();
}
}
}
</script>

</body>
</html>
