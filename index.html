<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hạ Linh Hotel | Vũng Tàu</title>
    <meta name="description" content="Hạ Linh Hotel - Khách sạn Vũng Tàu giá tốt, gần biển.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Be Vietnam Pro"', 'sans-serif'] },
                    colors: {
                        ocean: { 50: '#f0f9ff', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fslightbox/3.0.9/index.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        .hero {
            background: linear-gradient(rgba(12, 74, 110, 0.6), rgba(12, 74, 110, 0.4)),
            url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1920');
            background-size: cover; background-position: center;
        }
        .popup {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 9999;
        }
        @media (max-width: 768px) { body { padding-bottom: 60px; } }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="fixed w-full bg-white/95 backdrop-blur-sm px-4 py-3 flex justify-between items-center shadow-sm z-50 border-b border-ocean-100">
        <a href="#" class="flex items-center gap-2">
            <img src="https://i.ibb.co/s9Wyb0wz/Logo-Hotel.png" alt="Logo" class="h-10 w-auto">
            <span class="font-bold text-ocean-900 text-lg hidden sm:inline">Hạ Linh Hotel</span>
        </a>
        
        <div class="flex items-center gap-4">
            <div class="flex bg-slate-100 p-1 rounded-lg text-xs font-bold border border-slate-200">
                <button onclick="changeLang('vi')" id="btn-vi" class="px-2 py-1 rounded bg-white shadow-sm text-ocean-600">VI</button>
                <button onclick="changeLang('en')" id="btn-en" class="px-2 py-1 rounded text-slate-400">EN</button>
            </div>
            <a href="#booking" data-t="nav_btn" class="bg-ocean-600 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-ocean-700 transition">Đặt phòng</a>
        </div>
    </nav>

    <header class="hero h-[70vh] flex items-center justify-center text-white text-center px-4">
        <div class="max-w-2xl">
            <h1 data-t="hero_title" class="text-3xl md:text-5xl font-bold mb-4 drop-shadow-lg">Trải nghiệm kỳ nghỉ tại Vũng Tàu</h1>
            <p data-t="hero_sub" class="mb-8 text-lg drop-shadow-md text-ocean-50">Phòng hiện đại · Tiện nghi · Giá tốt</p>
            <a href="#booking" data-t="hero_btn" class="bg-white text-ocean-700 font-semibold px-8 py-3 rounded-full hover:bg-ocean-50 transition shadow-lg">Xem giá & Đặt phòng</a>
        </div>
    </header>

    <section class="py-16 max-w-6xl mx-auto px-4">
        <div class="text-center mb-10">
            <h2 data-t="room_title" class="text-2xl font-bold text-ocean-900">Hạng Phòng</h2>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div onclick="openRoom('Superior')" class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md cursor-pointer transition border border-slate-100">
                <img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&w=800" class="h-52 w-full object-cover">
                <div class="p-4 flex justify-between items-center">
                    <h3 class="font-bold text-ocean-900">Superior</h3>
                    <span data-t="room_view_btn" class="text-ocean-600 text-sm font-medium">Xem ngay</span>
                </div>
            </div>
            
            <div onclick="openRoom('Deluxe')" class="bg-white rounded-2xl overflow-hidden shadow-md cursor-pointer transition border-2 border-ocean-500 relative">
                <span data-t="room_popular" class="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded">PHỔ BIẾN</span>
                <img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&w=800" class="h-52 w-full object-cover">
                <div class="p-4 flex justify-between items-center bg-ocean-50/50">
                    <h3 class="font-bold text-ocean-900">Deluxe</h3>
                    <span data-t="room_view_btn" class="text-ocean-600 text-sm font-medium">Xem ngay</span>
                </div>
            </div>

            <div onclick="openRoom('Family')" class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md cursor-pointer transition border border-slate-100">
                <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=800" class="h-52 w-full object-cover">
                <div class="p-4 flex justify-between items-center">
                    <h3 class="font-bold text-ocean-900">Family</h3>
                    <span data-t="room_view_btn" class="text-ocean-600 text-sm font-medium">Xem ngay</span>
                </div>
            </div>
        </div>
    </section>

    <section id="booking" class="py-16 bg-ocean-900 px-4">
        <div class="max-w-xl mx-auto bg-white p-6 shadow-2xl rounded-2xl">
            <h2 data-t="book_title" class="text-2xl font-bold text-center text-ocean-900 mb-6">Đặt phòng nhanh</h2>

            <form onsubmit="handleBooking(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input id="name" data-p="name" placeholder="Họ tên" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-ocean-500 outline-none">
                    <input id="phone" data-p="phone" placeholder="Số điện thoại *" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-ocean-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input id="checkin" class="w-full border p-3 rounded-lg bg-white cursor-pointer">
                    <input id="checkout" class="w-full border p-3 rounded-lg bg-white cursor-pointer">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select id="room" required class="w-full border p-3 rounded-lg bg-white">
                        <option value="" data-t="opt_room">Chọn hạng phòng</option>
                        <option value="Superior">Superior</option>
                        <option value="Deluxe">Deluxe</option>
                        <option value="Family">Family</option>
                    </select>
                    <select id="quantity" required class="w-full border p-3 rounded-lg bg-white">
                        <option value="" data-t="opt_qty">Số lượng</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    </select>
                </div>

                <textarea id="note" data-p="note" rows="2" placeholder="Yêu cầu thêm..." class="w-full border p-3 rounded-lg outline-none"></textarea>

                <button type="submit" data-t="book_submit" class="w-full bg-ocean-600 hover:bg-ocean-700 text-white font-bold py-4 rounded-xl shadow-lg transition">
                    Đặt ngay qua Zalo
                </button>
            </form>
        </div>
    </section>

    <div class="fixed bottom-0 left-0 w-full bg-white shadow-[0_-2px_10px_rgba(0,0,0,0.1)] flex md:hidden z-50">
        <a href="tel:0365203109" class="flex-1 py-4 text-center text-ocean-700 font-semibold border-r border-slate-200">📞 <span data-t="stick_call">Gọi ngay</span></a>
        <a href="https://zalo.me/0365203109" target="_blank" class="flex-1 py-4 text-center bg-ocean-600 text-white font-semibold">💬 Zalo</a>
    </div>

    <div id="popup" class="popup" onclick="closeRoom()">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-[90%] relative" onclick="event.stopPropagation()">
            <h3 id="roomTitle" class="text-xl font-bold text-ocean-900 border-b pb-2"></h3>
            <div class="grid grid-cols-2 gap-2 mt-4 text-sm text-slate-600">
                <span>📶 Wi-Fi</span><span>❄️ Air-con</span><span>🚿 Shower</span><span>📺 TV</span>
            </div>
            <button onclick="selectRoom()" data-t="pop_select" class="bg-ocean-600 text-white w-full py-3 rounded-lg mt-6 font-semibold">Chọn phòng này</button>
        </div>
    </div>

    <script>
        // DỮ LIỆU ĐA NGÔN NGỮ
        const i18n = {
            vi: {
                nav_btn: "Đặt ngay", hero_title: "Trải nghiệm kỳ nghỉ tại Vũng Tàu",
                hero_sub: "Phòng hiện đại · Tiện nghi · Giá tốt", hero_btn: "Xem giá & Đặt phòng",
                room_title: "Hạng Phòng", room_view_btn: "Xem ngay", room_popular: "PHỔ BIẾN",
                book_title: "Đặt phòng nhanh", opt_room: "Chọn hạng phòng", opt_qty: "Số lượng",
                book_submit: "Đặt ngay qua Zalo", stick_call: "Gọi ngay", pop_select: "Chọn phòng này",
                placeholder_name: "Họ tên", placeholder_phone: "Số điện thoại *", placeholder_note: "Yêu cầu thêm...",
                msg_success: "Đã tạo tin nhắn! Đang mở Zalo..."
            },
            en: {
                nav_btn: "Book Now", hero_title: "Enjoy Your Stay in Vung Tau",
                hero_sub: "Modern Rooms · Full Amenities · Best Price", hero_btn: "Check Price & Book",
                room_title: "Our Rooms", room_view_btn: "View Details", room_popular: "POPULAR",
                book_title: "Quick Booking", opt_room: "Select Room Type", opt_qty: "Quantity",
                book_submit: "Book via Zalo / WhatsApp", stick_call: "Call Now", pop_select: "Select This Room",
                placeholder_name: "Full Name", placeholder_phone: "Phone Number *", placeholder_note: "Special requests...",
                msg_success: "Message created! Opening Zalo..."
            }
        };

        let currentLang = 'vi';
        let flatCheckin, flatCheckout;

        // HÀM CHUYỂN ĐỔI NGÔN NGỮ
        function changeLang(lang) {
            currentLang = lang;
            
            // Cập nhật giao diện nút
            document.getElementById('btn-vi').className = lang === 'vi' ? 'px-2 py-1 rounded bg-white shadow-sm text-ocean-600' : 'px-2 py-1 rounded text-slate-400';
            document.getElementById('btn-en').className = lang === 'en' ? 'px-2 py-1 rounded bg-white shadow-sm text-ocean-600' : 'px-2 py-1 rounded text-slate-400';

            // Cập nhật text trong DOM
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                el.innerText = i18n[lang][key];
            });

            // Cập nhật placeholder
            document.querySelectorAll('[data-p]').forEach(el => {
                const key = 'placeholder_' + el.getAttribute('data-p');
                el.placeholder = i18n[lang][key];
            });

            // Cập nhật ngôn ngữ bộ lịch
            flatCheckin.set("locale", lang === 'vi' ? "vn" : "default");
            flatCheckout.set("locale", lang === 'vi' ? "vn" : "default");
        }

        // KHỞI TẠO LỊCH
        flatCheckin = flatpickr("#checkin", { dateFormat: "d/m/Y", defaultDate: "today", minDate: "today", locale: "vn" });
        flatCheckout = flatpickr("#checkout", { dateFormat: "d/m/Y", defaultDate: new Date().getTime() + 86400000, minDate: "today", locale: "vn" });

        // POPUP PHÒNG
        let selectedRoomType = "";
        function openRoom(name) {
            selectedRoomType = name;
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('popup').style.display = 'flex';
        }
        function closeRoom() { document.getElementById('popup').style.display = 'none'; }
        function selectRoom() {
            document.getElementById('room').value = selectedRoomType;
            closeRoom();
            document.getElementById('booking').scrollIntoView({behavior: 'smooth'});
        }

        // GỬI ĐẶT PHÒNG
        function handleBooking(e) {
            e.preventDefault();
            const msg = `Hạ Linh Hotel - Booking Request:\n- Name: ${document.getElementById('name').value}\n- Phone: ${document.getElementById('phone').value}\n- Room: ${document.getElementById('room').value}\n- Qty: ${document.getElementById('quantity').value}\n- In: ${document.getElementById('checkin').value}\n- Out: ${document.getElementById('checkout').value}\n- Note: ${document.getElementById('note').value}`;
            window.open(`https://zalo.me/0365203109?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
