<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hạ Linh Hotel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1920');
background-size:cover;
background-position:center;
}
</style>
</head>

<body class="bg-white text-gray-800">

<!-- NAV -->
<nav class="fixed w-full bg-white/90 backdrop-blur px-4 py-3 flex items-center justify-between shadow z-50">
<a href="#" class="flex items-center gap-2">
<img src="https://i.ibb.co/s9Wyb0wz/Logo-Hotel.png" class="h-8">
<span class="font-bold">Hạ Linh Hotel</span>
</a>
</nav>

<!-- HERO -->
<header class="hero h-[70vh] flex items-center justify-center text-white text-center px-4">
<div>
<h1 class="text-3xl font-semibold mb-3">Khách sạn gần biển Vũng Tàu</h1>
<p class="mb-4">Phòng đẹp · Giá tốt</p>
<a href="#booking" class="bg-white text-black px-5 py-2 rounded-full">Đặt phòng</a>
</div>
</header>

<!-- BOOKING -->
<section id="booking" class="py-16 bg-gray-50 px-4">

<div class="max-w-md mx-auto bg-white p-5 shadow rounded">

<h2 class="text-center font-bold mb-4 text-lg">Đặt phòng ngay!</h2>

<form onsubmit="handleBooking(event)" class="space-y-4 text-sm">

<input id="name" placeholder="Tên" class="w-full border p-3 rounded">

<input id="phone" placeholder="SĐT Zalo *" class="w-full border p-3 rounded">

<div>
<label class="text-xs text-gray-500">Check-in *</label>
<input id="checkin" class="w-full border p-3 rounded mt-1">
</div>

<div>
<label class="text-xs text-gray-500">Check-out *</label>
<input id="checkout" class="w-full border p-3 rounded mt-1">
</div>

<select id="room" class="w-full border p-3 rounded">
<option value="">Chọn hạng phòng *</option>
<option>Superior</option>
<option>Deluxe</option>
<option>Family</option>
</select>

<!-- SỐ LƯỢNG PHÒNG -->
<select id="quantity" class="w-full border p-3 rounded">
<option value="">Số lượng phòng *</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button class="bg-black text-white w-full py-3 rounded text-sm font-semibold">
Copy thông tin và đặt qua Zalo ngay!
</button>

</form>

</div>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center py-8">
<p class="font-semibold">Hạ Linh Hotel</p>
<p class="text-sm opacity-60">Vũng Tàu</p>
</footer>

<script>

// DATE
let today=new Date();
let tomorrow=new Date();
tomorrow.setDate(today.getDate()+1);

flatpickr("#checkin",{dateFormat:"d/m/Y",defaultDate:today});
flatpickr("#checkout",{dateFormat:"d/m/Y",defaultDate:tomorrow});

// HANDLE BOOKING
function handleBooking(e){
e.preventDefault();

let name=document.getElementById('name').value||"";
let phone=document.getElementById('phone').value;
let checkin=document.getElementById('checkin').value;
let checkout=document.getElementById('checkout').value;
let room=document.getElementById('room').value;
let quantity=document.getElementById('quantity').value;

if(!phone){
alert("Vui lòng điền số điện thoại liên hệ");
return;
}
if(!checkin||!checkout){
alert("Vui lòng chọn ngày");
return;
}
if(!room){
alert("Vui lòng chọn hạng phòng");
return;
}
if(!quantity){
alert("Vui lòng chọn số lượng phòng");
return;
}

let msg =
`Người đặt: ${name} - SĐT ${phone}
Tôi muốn đặt ${quantity} phòng ${room}, check-in ngày ${checkin} và check-out ngày ${checkout}.`;

// COPY
navigator.clipboard.writeText(msg).then(()=>{
alert("Đã copy nội dung! Mở Zalo và dán để gửi nhé 👍");
});

// OPEN ZALO
window.open("https://zalo.me/0365203109","_blank");

}

</script>

</body>
</html>
