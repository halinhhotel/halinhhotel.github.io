<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hạ Linh Hotel - Boutique Vũng Tàu</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; }

/* HERO */
.hero {
  background: linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
  url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1920');
  background-size: cover;
  background-position: center;
}

/* FADE ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: all .8s ease;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* SLIDER */
.slider img { display:none; }
.slider img.active { display:block; }

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
}
.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body class="bg-white text-gray-800">

<!-- NAV -->
<nav class="fixed w-full bg-white/80 backdrop-blur z-50 px-6 py-4 flex justify-between shadow-sm">
  <b class="tracking-wide">Hạ Linh Hotel</b>
  <div class="space-x-6 text-sm">
    <a href="#rooms">Phòng</a>
    <a href="#gallery">Gallery</a>
    <a href="#map">Vị trí</a>
    <a href="#booking">Liên hệ</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero h-screen flex items-center justify-center text-white text-center">
  <div class="fade">
    <h1 class="text-5xl md:text-6xl font-light tracking-wide mb-4">
      Hạ Linh Hotel
    </h1>
    <p class="mb-6 text-lg opacity-90">
      Boutique stay gần biển Vũng Tàu
    </p>
    <a href="#rooms" class="bg-white text-black px-8 py-3 rounded-full">
      Khám phá
    </a>
  </div>
</header>

<!-- ROOMS -->
<section id="rooms" class="py-24 max-w-6xl mx-auto px-4">
<h2 class="text-3xl font-light text-center mb-16">Hạng phòng</h2>

<div class="grid md:grid-cols-3 gap-10">

<!-- ROOM -->
<div class="fade">
<div class="slider" onclick="nextSlide(this)">
<img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304" class="active w-full h-64 object-cover">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2" class="w-full h-64 object-cover">
</div>
<div class="mt-4">
<h3 class="font-semibold">Superior</h3>
<p class="text-sm text-gray-500">✔ Giá tốt · ❌ Không view</p>
<button onclick="openRoom('Superior')" class="text-sm mt-2 underline">Xem chi tiết</button>
</div>
</div>

<div class="fade">
<div class="slider" onclick="nextSlide(this)">
<img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39" class="active w-full h-64 object-cover">
<img src="https://images.unsplash.com/photo-1582719478250" class="w-full h-64 object-cover">
</div>
<div class="mt-4">
<h3 class="font-semibold">Deluxe Ocean</h3>
<p class="text-sm text-gray-500">✔ View biển · ✔ Ban công</p>
<button onclick="openRoom('Deluxe')" class="text-sm mt-2 underline">Xem chi tiết</button>
</div>
</div>

<div class="fade">
<div class="slider" onclick="nextSlide(this)">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" class="active w-full h-64 object-cover">
<img src="https://images.unsplash.com/photo-1505691938895" class="w-full h-64 object-cover">
</div>
<div class="mt-4">
<h3 class="font-semibold">Family</h3>
<p class="text-sm text-gray-500">✔ Rộng · ✔ Gia đình</p>
<button onclick="openRoom('Family')" class="text-sm mt-2 underline">Xem chi tiết</button>
</div>
</div>

</div>
</section>

<!-- GALLERY -->
<section id="gallery" class="py-20 bg-gray-50">
<h2 class="text-3xl font-light text-center mb-12">Gallery</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-6xl mx-auto px-4">
<img onclick="openImg(this)" src="https://images.unsplash.com/photo-1566073771259" class="rounded cursor-pointer">
<img onclick="openImg(this)" src="https://images.unsplash.com/photo-1582719478250" class="rounded cursor-pointer">
<img onclick="openImg(this)" src="https://images.unsplash.com/photo-1611892440504" class="rounded cursor-pointer">
<img onclick="openImg(this)" src="https://images.unsplash.com/photo-1590490360182" class="rounded cursor-pointer">
</div>
</section>

<!-- MAP -->
<section id="map" class="py-20">
<h2 class="text-2xl text-center mb-6">Vị trí khách sạn</h2>

<div class="max-w-5xl mx-auto px-4">
<iframe src="https://www.google.com/maps?q=Vung+Tau&output=embed"
class="w-full h-96 rounded"></iframe>
</div>
</section>

<!-- BOOKING -->
<section id="booking" class="py-20 bg-gray-50">
<div class="max-w-lg mx-auto bg-white p-6 shadow rounded">

<h2 class="text-center text-xl mb-4">Gửi yêu cầu</h2>

<form onsubmit="sendZalo(event)" class="space-y-3">
<input id="name" placeholder="Tên" class="w-full border p-2">
<input id="phone" placeholder="SĐT" class="w-full border p-2">
<select id="room" class="w-full border p-2">
<option>Superior</option>
<option>Deluxe</option>
<option>Family</option>
</select>

<button class="bg-black text-white w-full py-2">Gửi Zalo</button>
</form>

</div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
<img id="lightbox-img">
</div>

<!-- FOOTER -->
<footer class="bg-black text-white py-10 text-center">
<p>Hạ Linh Hotel</p>
<p class="text-sm opacity-60">Vũng Tàu</p>
</footer>

<script>
// slider
function nextSlide(el){
let imgs = el.querySelectorAll('img');
let i = [...imgs].findIndex(img=>img.classList.contains('active'));
imgs[i].classList.remove('active');
imgs[(i+1)%imgs.length].classList.add('active');
}

// fade on scroll
const observer = new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add('show');
});
});
document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

// lightbox
function openImg(img){
document.getElementById('lightbox').style.display='flex';
document.getElementById('lightbox-img').src=img.src;
}

// zalo
function sendZalo(e){
e.preventDefault();
let name = document.getElementById('name').value;
let phone = document.getElementById('phone').value;
let room = document.getElementById('room').value;

let msg = `Booking:%0A${name}%0A${phone}%0A${room}`;
window.open(`https://zalo.me/0365203109?text=${msg}`);
}

// room popup (basic)
function openRoom(name){
alert('Chi tiết phòng: ' + name);
}
</script>

</body>
</html>
